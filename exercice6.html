<!DOCTYPE html>

    <title>Exercice 6 - Debug</title>

<body>

    <h1>Exercice 6 - Nommage et débogage</h1>

    <script>
        // Variables corrigées
        let premierPrix = 100;
        let deuxiemePrix = 80;
        let prixMinimum = 50;
        let prixIntermediaire = 200; // ancien "var"
        let prixMaximum = 300;

        // Calcul du prix moyen (logique inchangée)
        let prixMoyen = (premierPrix + deuxiemePrix + prixMinimum + prixIntermediaire + prixMaximum) / 5;

        // Affichage demandé
        console.log("Le prix moyen :", prixMoyen);
        console.log("Le prix minimum :", prixMinimum);
        console.log("Le prix maximum :", prixMaximum);
    </script>

</body>
